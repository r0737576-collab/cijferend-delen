<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staartdeling — quotient max. 3 decimalen</title>

<style>
:root{
  --ink:#000;
  --grid:#c8c8c8;
  --cell:38px;
  --commaW:10px;
  --vline:4px;
  --bar:4px;
  --accent:#1f6feb;
}

*{box-sizing:border-box}
body{ margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial; background:#f3f3f3; color:#000; }

header, .toolbar{ background:#fff; border-bottom:1px solid #ddd; padding:.8rem 1rem; }
.toolbar{ display:flex; flex-wrap:wrap; gap:.6rem; align-items:center; }
.group{
  display:flex; gap:.4rem; align-items:center;
  background:#f1f1f1; border:1px solid #ddd; border-radius:.4rem; padding:.3rem .5rem;
}
button{ padding:.45rem .7rem; border:1px solid #bbb; border-radius:.4rem; background:#fff; cursor:pointer; }
button:hover{ border-color:#000; }

main{ padding:1rem; }
.board{ background:#fff; border:1px solid #ddd; border-radius:.6rem; padding:1rem; max-width:980px; margin:auto; }

.gridrow, .workRow{ display:grid; }
.gridcell, .wcell{
  height:var(--cell);
  border-right:1px solid var(--grid);
  border-bottom:1px solid var(--grid);
  display:flex; align-items:center; justify-content:center;
  font-weight:600; font-size:1.2rem;
}
.gridrow{ border:1px solid var(--grid); border-right:none; border-bottom:none; }
.gridcell:last-child, .wcell:last-child{ border-right:none; }
.gray{ color:#888; }

#gridWrapper{ display:flex; align-items:flex-start; gap:.2rem; }
#leftSide{ display:flex; flex-direction:column; gap:.6rem; }
#vline{ width:var(--vline); background:#000; margin-left:.15rem; margin-right:.35rem; border-radius:2px; align-self:stretch; }
#rightSide{ display:flex; flex-direction:column; gap:.5rem; padding-top:.05rem; }
#hbar{ height:var(--bar); background:#000; border-radius:2px; }

#workArea{ display:flex; flex-direction:column; gap:.15rem; }
.workRow{ border-left:1px solid var(--grid); }
#workArea .workRow:first-child .wcell{ border-top:1px solid var(--grid); }

.wcell[contenteditable="true"], .gridcell[contenteditable="true"]{ outline:none; caret-color: var(--ink); }
.wcell[contenteditable="true"]:focus, .gridcell[contenteditable="true"]:focus{
  box-shadow: inset 0 0 0 2px var(--accent); background:#f7fbff;
}

.wcell.topline{ position:relative; }
.wcell.topline::before{ content:""; position:absolute; left:-1px; right:-1px; top:-2px; border-top:3px solid #000; }

@media print{
  header,.toolbar{ display:none!important; }
  main{ padding:0 }
  .board{ border:none }
}
</style>
</head>

<body>

<header><h1>Staartdeling</h1></header>

<div class="toolbar">
  <div class="group">
    <label><input type="radio" name="rest" value="zonder" checked> uitkomst</label>
    <label><input type="radio" name="rest" value="met"> met rest</label>
  </div>
  <div class="group"><label><input type="checkbox" id="toDecimals"> tot 0,001</label></div>
  <div class="group"><label><input type="checkbox" id="enableCheck"> controle</label></div>

  <button id="btnNew">Nieuwe oefening</button>
  <button id="btnCheck">Nakijken</button>
  <button id="btnSolution">Oplossing</button>
  <button id="btnReset">Wissen</button>
</div>

<main>
<section class="board" style="display:flex; align-items:flex-start; gap:80px;">

<div id="gridWrapper">

  <div id="leftSide">
    <div id="grid" class="gridrow"></div>
    <div id="workArea"></div>
  </div>

  <div id="vline"></div>

  <div id="rightSide">
    <div id="divGrid" class="gridrow"></div>
    <div id="hbar"></div>
    <div id="quotGrid" class="gridrow"></div>
  </div>

</div>

<div id="controleZone"></div>

</section>
</main>


<script>
(function(){

/* ===========================
   Helper functies
=========================== */

const rnd = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const $   = sel => document.querySelector(sel);

function clear(n){ n.innerHTML=''; }

const buildColumns = (count, commaIdx=-1)=>
  new Array(count).fill(0).map((_,i)=> i===commaIdx ? 'var(--commaW)' : 'var(--cell)').join(' ');


/* ===========================
   OPGAVE GENEREREN
=========================== */

function generateProblem(noRemainder){
  const divisor = rnd(2,20);
  let dividend;
  if(noRemainder){
    const q = rnd(2, Math.floor(10000/divisor));
    dividend = divisor*q;
  } else {
    dividend = rnd(2,10000);
    if(dividend % divisor === 0) dividend++;
  }
  return { dividend, divisor };
}


/* ===========================
   DEELTAL (LINKS)
=========================== */

function buildDividendGrid(node, dividend, useDec){
  clear(node);
  const s = String(dividend);
  const intLen = s.length;
  const totalCols = intLen + (useDec ? 4 : 0);

  node.style.gridTemplateColumns = buildColumns(totalCols, useDec ? intLen : -1);

  for(const ch of s){
    const c=document.createElement('div');
    c.className='gridcell';
    c.textContent=ch;
    node.appendChild(c);
  }

  if(useDec){
    const comma=document.createElement('div');
    comma.className='gridcell';
    comma.textContent=',';
    node.appendChild(comma);
    for(let i=0;i<3;i++){
      const z=document.createElement('div');
      z.className='gridcell gray';
      z.textContent='0';
      node.appendChild(z);
    }
  }

  return { intLen, totalCols, commaIndex: useDec ? intLen : -1 };
}


/* ===========================
   DELER (RECHTS BOVENAAN)
=========================== */

function buildDivisorGrid(node, divisor){
  clear(node);
  const s = String(divisor);
  node.style.gridTemplateColumns = buildColumns(s.length);
  for(const ch of s){
    const c=document.createElement('div');
    c.className='gridcell';
    c.textContent=ch;
    node.appendChild(c);
  }
}


/* ===========================
   QUOTIENT (RECHTS)
=========================== */

let qState = { cols:0, base:0, commaIdx:-1, maxExtraDec:3 };

function buildQuotGrid(node, intLen){
  clear(node);
  qState = { cols:intLen, base:intLen, commaIdx:-1, maxExtraDec:3 };

  node.dataset.intlen = String(intLen);
  node.style.gridTemplateColumns = buildColumns(qState.cols, -1);

  for(let i=0;i<qState.cols;i++){
    node.appendChild(makeQuotCell(i));
  }

  setupHBarAutoWidth(node);
}

function makeQuotCell(idx){
  const c=document.createElement('div');
  c.className='gridcell';
  c.contentEditable=true;

  c.addEventListener('input',()=>{
    let t = (c.textContent||'').trim();

    const grid = $('#quotGrid');

    // Komma
    if(/[.,]/.test(t)){
      c.textContent=',';
      if(qState.commaIdx!==-1 && qState.commaIdx!==idx){
        grid.children[qState.commaIdx].textContent='';
      }
      qState.commaIdx = idx;
      grid.style.gridTemplateColumns = buildColumns(qState.cols, qState.commaIdx);
      ensureOneExtraAfterComma();
      syncHBar();
      return;
    }

    // Cijfers
    t = t.replace(/\D+/g,'');
    if(t.length>1) t = t.slice(-1);
    c.textContent = t;

    // Als komma wegvalt
    if(qState.commaIdx===idx && c.textContent!==','){
      qState.commaIdx=-1;
      trimToBase();
    }

    if(qState.commaIdx!==-1) growDecimalsIfNeeded();
    syncHBar();
  });

  return c;
}

function ensureOneExtraAfterComma(){
  const extra = qState.cols - qState.base;
  if(extra < 1) addQuotColumn();
}

function growDecimalsIfNeeded(){
  const grid = $('#quotGrid');
  const extra = qState.cols - qState.base;
  if(extra >= qState.maxExtraDec) return;
  const last = grid.children[grid.children.length-1];
  const filled = (last.textContent||'').trim()!=='';
  if(filled) addQuotColumn();
}

function addQuotColumn(){
  const grid = $('#quotGrid');
  const extra = qState.cols - qState.base;
  if(extra >= qState.maxExtraDec) return;
  qState.cols++;
  grid.style.gridTemplateColumns = buildColumns(qState.cols, qState.commaIdx);
  grid.appendChild(makeQuotCell(qState.cols-1));
}

function trimToBase(){
  const grid = $('#quotGrid');
  while(grid.children.length > qState.base){
    grid.removeChild(grid.lastElementChild);
  }
  qState.cols = qState.base;
}

function setupHBarAutoWidth(quotNode){
  const hbar = $('#hbar');
  const ro = new ResizeObserver(()=>{
    hbar.style.width = quotNode.getBoundingClientRect().width + 'px';
  });
  ro.observe(quotNode);
}

function syncHBar(){
  $('#hbar').style.width =
    $('#quotGrid').getBoundingClientRect().width + 'px';
}


/* ===========================
   WERKVELD (LINKS)
=========================== */

function baseRowRule(dividend, divisor){
  const s = String(dividend);
  const n = s.length;
  const first = parseInt(s[0],10);
  return (first>=divisor) ? (2*n) : (2*n-2);
}

function buildWorkArea(node, dividend, divisor, useDecimals, colsLeft, commaIdx){
  clear(node);
  const rows = baseRowRule(dividend, divisor)+6;

  for(let r=0;r<rows;r++){
    const row=document.createElement('div');
    row.className='workRow';
    row.style.gridTemplateColumns =
      buildColumns(colsLeft, useDecimals ? commaIdx : -1);

    for(let c=0;c<colsLeft;c++){
      const cell=document.createElement('div');
      cell.className='wcell';
      cell.contentEditable=true;

      cell.addEventListener('input',()=>{
        let t = (cell.textContent||'').replace(/\D+/g,'');

        if(t.length>=2){
          cell.textContent=t[0];
          const next=cell.nextElementSibling;
          if(next && next.isContentEditable){
            next.textContent=t[1];
            setTimeout(()=>focusCell(next),0);
          }
        } else {
          cell.textContent=t;
        }

        handleRowInput(node, row);
      });

      cell.addEventListener('blur',()=>handleRowInput(node,row));
      row.appendChild(cell);
    }

    node.appendChild(row);
  }
}

function handleRowInput(workArea, productRow){
  const rows = [...workArea.querySelectorAll('.workRow')];
  const idx = rows.indexOf(productRow);
  if(idx<0 || idx%2!==0) return;

  const restRow = rows[idx+1];
  if(!restRow) return;

  restRow.querySelectorAll('.wcell')
    .forEach(c=>c.classList.remove('topline'));

  const prod = [...productRow.querySelectorAll('.wcell')];
  const used = prod.map((c,i)=>({i,t:(c.textContent||'').trim()}))
                   .filter(x=>x.t!=='')
                   .map(x=>x.i);

  if(!used.length) return;

  const first = Math.min(...used);
  const last  = Math.max(...used);

  const restCells=[...restRow.querySelectorAll('.wcell')];
  for(let i=first;i<=last;i++){
    if(restCells[i]) restCells[i].classList.add('topline');
  }
}


/* ===========================
   NIEUWE OEFENING
=========================== */

let current = { dividend:0, divisor:0 };

function newExercise(){
  const noRemainder = document.querySelector('input[name="rest"]:checked').value === 'zonder';
  const useDec = $('#toDecimals').checked;

  current = generateProblem(noRemainder);

  // Links
  const {intLen,totalCols,commaIndex} =
    buildDividendGrid($('#grid'), current.dividend, useDec);

  // Rechts
  buildDivisorGrid($('#divGrid'), current.divisor);
  buildQuotGrid($('#quotGrid'), intLen);

  // Werkveld
  buildWorkArea($('#workArea'), current.dividend, current.divisor, useDec, totalCols, commaIndex);

  // Balk
  setTimeout(syncHBar,0);

  // ✔ AUTOMATISCHE CONTROLE
  if($('#enableCheck').checked){
    maakControle();
  }
}


/* ===========================
   EVENTS
=========================== */

$('#btnNew').addEventListener('click', newExercise);
$('#toDecimals').addEventListener('change', newExercise);

$('#btnReset').addEventListener('click',()=>{
  document.querySelectorAll('#workArea .wcell')
    .forEach(c=>{c.textContent=''; c.classList.remove('topline');});
  const q = $('#quotGrid');
  const intLen=parseInt(q.dataset.intlen,10)||1;
  buildQuotGrid(q,intLen);
});


/* ===========================
   AUTOMATISCHE VERBETERING
=========================== */

function berekenStappen(deeltal, deler, maxDec=3){
  let stappen=[];
  let rest=0;
  const cijfers = String(deeltal).split("");

  let huidig=parseInt(cijfers[0],10);
  let i;

  if(huidig<deler && cijfers.length>1){
    huidig=parseInt(cijfers[0]+cijfers[1],10);
    i=2;
  } else i=1;

  let q=Math.floor(huidig/deler);
  let product=q*deler;
  let aftrek=huidig-product;

  stappen.push({huidig,q,product,aftrek});
  rest=aftrek;

  for(;i<cijfers.length;i++){
    huidig = rest*10 + parseInt(cijfers[i],10);
    q=Math.floor(huidig/deler);
    product=q*deler;
    aftrek=huidig-product;
    stappen.push({huidig,q,product,aftrek});
    rest=aftrek;
  }

  let dec=0;
  while(rest!==0 && dec<maxDec){
    huidig=rest*10;
    q=Math.floor(huidig/deler);
    product=q*deler;
    aftrek=huidig-product;
    stappen.push({huidig,q,product,aftrek});
    rest=aftrek;
    dec++;
  }

  return stappen;
}

function kleurCel(cel, juist, uitleg, extra=null){
  const t=(cel.textContent||'').trim();
  if(t===''){ cel.style.background=''; cel.title=''; return; }
  const v=parseInt(t,10);
  if(v===juist){
    cel.style.background='lightgreen';
    cel.title='Juist ✔';
  } else {
    cel.style.background='lightcoral';
    cel.title = extra ? extra : `${uitleg} (moet ${juist})`;
  }
}

function verbeterQuotient(stappen){
  const cells=[...document.querySelectorAll('#quotGrid .gridcell')];
  let idx=0;
  cells.forEach(c=>{
    const t=(c.textContent||'').trim();
    if(t===''||t===',') return;
    const stap=stappen[idx];
    if(!stap) return;
    kleurCel(c, stap.q, 'Fout quotiëntcijfer');
    idx++;
  });
}

function verbeterWerkveld(stappen){
  const rows=[...document.querySelectorAll('#workArea .workRow')];

  stappen.forEach((stap,i)=>{
    const prodRow=rows[i*2];
    const restRow=rows[i*2+1];
    if(!prodRow||!restRow) return;

    const prodCells=[...prodRow.querySelectorAll('.wcell')]
      .filter(c=>c.textContent.trim()!=='');
    const juisteProd=String(stap.product).split('');
    const start = prodCells.length - juisteProd.length;

    prodCells.forEach((cel,idx)=>{
      const juistCijfer=juisteProd[idx-start];
      if(juistCijfer===undefined){
        cel.style.background=''; cel.title=''; return;
      }
      const v=parseInt(cel.textContent.trim());
      if(stap.product>stap.huidig){
        kleurCel(cel, parseInt(juistCijfer), 'Fout vermenigvuldiging', 'Product te groot gekozen');
      } else {
        kleurCel(cel, parseInt(juistCijfer), 'Fout vermenigvuldiging');
      }
    });

    const restCells=[...restRow.querySelectorAll('.wcell')]
      .filter(c=>c.textContent.trim()!=='');
    const juisteRest=String(stap.aftrek).split('');

    restCells.forEach((cel,idx)=>{
      if(idx>=juisteRest.length){
        cel.style.background=''; cel.title='Neergehaald cijfer'; return;
      }
      const v=parseInt(cel.textContent.trim());
      if(v>=current.divisor){
        kleurCel(cel, parseInt(juisteRest[idx]), 'Foute aftrekking', 'Rest moet kleiner zijn dan de deler');
      } else {
        kleurCel(cel, parseInt(juisteRest[idx]), 'Foute aftrekking');
      }
    });
  });
}

function verbeterAlles(){
  const stappen = berekenStappen(current.dividend, current.divisor, 3);
  verbeterQuotient(stappen);
  verbeterWerkveld(stappen);
}


/* ===========================
   CONTROLE
=========================== */

document.getElementById('enableCheck')
.addEventListener('change',function(){
  if(this.checked){
    maakControle();
  } else {
    $('#controleZone').innerHTML='';
  }
});

function maakControle(){
  const zone = $('#controleZone');

  const qCells = [...document.querySelectorAll('#quotGrid .gridcell')];
  let quotient = qCells
    .map(c=>c.textContent.trim())
    .filter(t=>t!=='' && t!==',')
    .join('');

  const dCells = [...document.querySelectorAll('#divGrid .gridcell')];
  let divisor = dCells.map(c=>c.textContent.trim()).join('');

  if(!quotient || !divisor){
    zone.innerHTML='<div style="font-family:monospace">Controle wordt opgebouwd...</div>';
    return;
  }

  const q=parseInt(quotient,10);
  const d=parseInt(divisor,10);
  const expected = q*d;

  const divisorString = d.toString();
  const divisorLength = divisorString.length;
  const singleDigit = divisorLength===1;
  const somLength = expected.toString().length;

  // UI
  zone.innerHTML = `
    <div style="font-family:monospace; text-align:right; display:inline-block;">
      <div>${quotient}</div>
      <div>× ${divisor}</div>

      <div style="border-top:1px solid black;margin:6px 0;"></div>

      <div id="controleRijen"></div>

      ${!singleDigit?`
        <div style="border-top:1px solid black;margin:6px 0;"></div>
        <div id="controleSom"></div>
      `:''}

      <div id="controleFeedback" style="margin-top:12px;"></div>
    </div>
  `;

  const rijenDiv = $('#controleRijen');
  const somDiv = $('#controleSom');
  const feedback = $('#controleFeedback');

  function controleer(){
    let tussen=true;
    let eind=true;

    if(somDiv){
      let s='';
      [...somDiv.querySelectorAll('span')]
        .forEach(x=>s+=x.textContent.replace(/\D/g,''));
      if(s.length===somLength){
        if(parseInt(s)!==expected) eind=false;
      } else eind=null;
    }

    const rijen=[...rijenDiv.children];
    rijen.forEach((rij,i)=>{
      const spans=[...rij.querySelectorAll('span')];
      let s='';
      spans.forEach(x=>s+=x.textContent.replace(/\D/g,''));
      const cijfer = parseInt(divisorString[divisorLength-1-i]||"0",10);
      const correct = (q*cijfer*Math.pow(10,i)).toString();
      if(parseInt(s||"0")!==parseInt(correct)) tussen=false;
    });

    if(eind===null){
      feedback.innerHTML='';
      return;
    }

    if(tussen && eind){
      feedback.innerHTML='<span style="color:green">✔ Alles correct</span>';
    } else if(!tussen){
      feedback.innerHTML='<span style="color:red">✘ Fout in tussenstappen</span>';
    } else {
      feedback.innerHTML='<span style="color:red">✘ Eindresultaat fout</span>';
    }
  }

  // tussenrijen
  for(let i=0;i<(singleDigit?1:divisorLength);i++){
    const rij=document.createElement('div');
    rij.style.marginBottom='4px';

    for(let s=0;s<i;s++){
      const sp=document.createElement('span');
      sp.style.display='inline-block';
      sp.style.width='20px';
      rij.appendChild(sp);
    }

    for(let j=0;j<quotient.length+1;j++){
      const sp=document.createElement('span');
      sp.contentEditable=true;
      sp.style.display='inline-block';
      sp.style.width='20px';
      sp.style.textAlign='center';
      sp.style.borderBottom='1px solid black';
      sp.style.marginRight='2px';
      rij.appendChild(sp);
    }

    rijenDiv.appendChild(rij);
  }

  // som
  if(!singleDigit){
    for(let i=0;i<somLength;i++){
      const sp=document.createElement('span');
      sp.contentEditable=true;
      sp.style.display='inline-block';
      sp.style.width='20px';
      sp.style.textAlign='center';
      sp.style.borderBottom='2px solid black';
      sp.style.marginRight='2px';
      somDiv.appendChild(sp);
    }
  }

  rijenDiv.addEventListener('input', controleer);
  if(somDiv) somDiv.addEventListener('input', controleer);
}


/* ===========================
   START
=========================== */

newExercise();                // bouw eerste oefening
if($('#enableCheck').checked) // controle als toggle al aan stond
  maakControle();

})();
</script>

</body>
</html>
